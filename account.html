<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mon compte — NeXera</title>
  <link rel="stylesheet" href="style2.css">
  <link rel="icon" href="logo.jpg">
</head>
<body data-requires-auth="true">
  <div class="app-layout">
    <aside class="app-sidebar">
      <div class="sidebar-header">
        <img class="brand-logo" src="logo.jpg" alt="Logo NeXera">
        <h1>NeXera</h1>
      </div>
      <nav class="sidebar-nav">
        <ul>
          <li><a href="index.html">Accueil</a></li>
          <li><a href="dashboard.html">Mon parcours</a></li>
          <li><a href="document2.html">Ressources</a></li>
          <li><a href="challenge.html">Défis</a></li>
          <li><a href="about.html">À propos</a></li>
          <li><a href="community.html">Communauté</a></li>
        </ul>
      </nav>
      <div class="sidebar-footer">
        <ul class="sidebar-footer-links">
          <li><a href="account.html" aria-current="page">Mon compte</a></li>
        </ul>
        <button id="logoutButton" class="button">Déconnexion</button>
      </div>
    </aside>
    <div class="app-content-wrapper">
      <main>
        <section class="section">
          <h2>Mon profil</h2>
          <div class="card">
            <p><strong>Nom :</strong> <span id="accountName">Chargement...</span></p>
            <p><strong>E-mail :</strong> <span id="accountEmail">Chargement...</span></p>
          </div>
        </section>
        <section class="section">
          <h2>Statistiques</h2>
          <div class="stat-grid" style="grid-template-columns: repeat(2, 1fr);">
            <article><span>Défis terminés</span><strong id="completedChallenges">0</strong></article>
            <article><span>Série actuelle</span><strong id="streakValue">0 j</strong></article>
          </div>
        </section>
      </main>
      <footer><p>© 2026 NeXera — Tous droits réservés</p></footer>
    </div>
  </div>
  <script type="module">
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js";
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";

    // Re-initialize for this module context, though maybe not strictly necessary
    const firebaseConfig = {
      apiKey: "AIzaSyDUGGgw7Mn3kt4ZPMtKaz6_DhoIISIbCes",
      authDomain: "nexera-83148.firebaseapp.com",
      projectId: "nexera-83148",
      storageBucket: "nexera-83148.firebasestorage.app",
      messagingSenderId: "827059503362",
      appId: "1:827059503362:web:69d6e9a2f1939320e3421b"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    onAuthStateChanged(auth, (user) => {
      if (user) {
        document.getElementById('accountName').textContent = user.displayName || 'Utilisateur';
        document.getElementById('accountEmail').textContent = user.email;
      } else {
        window.location.href = 'auth.html';
      }
    });
  </script>
  <script type="module" src="script.js"></script>
</body>
</html>
